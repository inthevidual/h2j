<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff0f5"/>
      <stop offset="25%" stop-color="#ff69b4"/>
      <stop offset="48%" stop-color="#fff"/>
      <stop offset="52%" stop-color="#fff"/>
      <stop offset="75%" stop-color="#ff1493"/>
      <stop offset="100%" stop-color="#99004d"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#ff1493" flood-opacity="0.9" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feFlood flood-color="#ff1493" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>
  <!-- Outer glow layer -->
  <text x="256" y="230" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-size="165" font-weight="900" font-style="italic" fill="#ff1493" filter="url(#outer-glow)" opacity="0.5">HEIC</text>
  <text x="256" y="410" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-size="185" font-weight="900" font-style="italic" fill="#ff1493" filter="url(#outer-glow)" opacity="0.5">2JPG</text>
  <!-- Main text -->
  <text x="256" y="230" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-size="165" font-weight="900" font-style="italic" fill="url(#chrome)" filter="url(#neon-glow)">HEIC</text>
  <text x="256" y="410" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-size="185" font-weight="900" font-style="italic" fill="url(#chrome)" filter="url(#neon-glow)">2JPG</text>
  <!-- Speed lines -->
  <g stroke="#ff1493" stroke-width="3.5" opacity="0.6" stroke-linecap="round">
    <line x1="18" y1="145" x2="88" y2="145"/>
    <line x1="35" y1="175" x2="75" y2="175"/>
    <line x1="22" y1="330" x2="82" y2="330"/>
    <line x1="30" y1="365" x2="95" y2="365"/>
    <line x1="15" y1="400" x2="65" y2="400"/>
  </g>
</svg>
