<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="30%" stop-color="#f8bbd0"/>
      <stop offset="50%" stop-color="#fff"/>
      <stop offset="70%" stop-color="#f48fb1"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <filter id="neon-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.8" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outer-glow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feFlood flood-color="#ec4899" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg-grad)"/>
  <!-- Outer glow layer -->
  <text x="256" y="320" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-size="220" font-weight="900" font-style="italic" fill="#ec4899" filter="url(#outer-glow)" opacity="0.6">H2J</text>
  <!-- Main text -->
  <text x="256" y="320" text-anchor="middle" font-family="'Impact','Arial Black',sans-serif" font-size="220" font-weight="900" font-style="italic" fill="url(#chrome)" filter="url(#neon-glow)">H2J</text>
  <!-- Speed lines -->
  <g stroke="#ec4899" stroke-width="3" opacity="0.5">
    <line x1="30" y1="180" x2="100" y2="180"/>
    <line x1="50" y1="210" x2="130" y2="210"/>
    <line x1="20" y1="240" x2="90" y2="240"/>
    <line x1="40" y1="340" x2="110" y2="340"/>
    <line x1="25" y1="370" x2="105" y2="370"/>
  </g>
</svg>
