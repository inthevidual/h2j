<!DOCTYPE html>
<html lang="sv" data-theme="night">
<head>
    <meta charset="UTF-8">
    <!-- Open Graph -->
    <meta property="og:title" content="HEIC2JPG – konvertera HEIC till JPG">
    <meta property="og:description" content="Snabb och privat HEIC-till-JPG-konvertering – allt sker lokalt i din webbläsare.">
    <meta property="og:type" content="website">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HEIC2JPG – konvertera HEIC till JPG</title>
    <meta name="description" content="Konvertera HEIC/HEIF-bilder till JPG direkt i webbläsaren. Inga filer laddas upp – allt sker lokalt.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700;800&family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1.00">

    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Fira Sans', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Mono', monospace;
            --color-primary: #ff1493;
            --color-primary-content: #fff;
            --color-accent: #ff1493;
            --color-accent-content: #fff;
            --color-secondary: #ff69b4;
            --color-secondary-content: #fff;
            --color-base-100: #141414;
            --color-base-200: #1c1c1c;
            --color-base-300: #2a2a2a;
            --color-base-content: #ffffff;
            --color-neutral: #1c1c1c;
            --color-neutral-content: #ffffff;
        }
    </style>
    <link rel="stylesheet" href="h2j-styles.css?v=1.00">
</head>
<body class="min-h-screen bg-base-100 text-base-content font-sans">
    <div class="max-w-lg mx-auto px-4 py-6">

        <!-- HEADER -->
        <header class="mb-6">
            <div class="card card-border bg-base-200 shadow-md">
                <div class="card-body flex flex-col items-center gap-3 py-5">
                    <div class="w-20 h-20 p-2 bg-base-100 rounded-2xl border border-base-300 shrink-0">
                        <img src="favicon.svg?v=1.00" alt="HEIC2JPG" class="w-full h-full object-contain drop-shadow-md">
                    </div>
                    <div class="text-center">
                        <div class="brand-title text-3xl font-extrabold tracking-wider uppercase font-mono">HEIC2JPG</div>
                        <div class="flex items-center justify-center flex-wrap gap-2 text-white/60 font-mono text-sm mt-1">
                            <span>HEIC till JPG</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- PRIVACY NOTICE -->
        <div class="text-center text-sm text-white/70 mb-4 px-2">
            Dina bilder lämnar aldrig din enhet. All konvertering sker lokalt i webbläsaren.
        </div>

        <!-- UPLOAD ZONE -->
        <section class="mb-5">
            <div class="drop-zone card card-dash" id="dropZone">
                <div class="card-body flex flex-col justify-center items-center text-center py-10">
                    <svg class="upload-icon w-14 h-14 mb-3" style="color:#ff1493;opacity:0.8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                    </svg>
                    <h3 class="text-base font-semibold mb-1">Tryck här eller dra och släpp</h3>
                    <p class="text-white/60 text-sm mb-0">Välj upp till 50 HEIC-bilder</p>
                    <p class="text-white/40 text-xs mt-2">1–4 bilder laddas ner var för sig, 5+ packas som ZIP</p>
                </div>
                <input type="file" id="fileInput" accept=".heic,.heif,image/heic,image/heif,image/*" multiple hidden>
            </div>
            <div id="uploadWarning" class="text-center text-sm mt-3 font-semibold" style="color:#f87171" hidden></div>
        </section>

        <!-- FILE LIST -->
        <section id="fileListSection" class="mb-5" hidden>
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-semibold text-white font-mono" id="fileCount">0 bilder</span>
                <button type="button" id="clearBtn" class="btn btn-soft btn-sm" style="--btn-color:#ff1493">Rensa</button>
            </div>
            <div id="fileList" class="flex flex-col gap-2"></div>
        </section>

        <!-- OVERALL PROGRESS -->
        <section id="progressSection" class="card card-border mb-5" hidden>
            <div class="card-body py-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-semibold text-white">Konverterar...</span>
                    <span id="progressText" class="text-sm font-mono text-white/70">0 / 0</span>
                </div>
                <div class="overall-progress">
                    <div id="overallProgressFill" class="overall-progress-fill"></div>
                </div>
            </div>
        </section>

        <!-- SAVE ALL (shown after conversion, user-triggered for iOS compat) -->
        <section id="saveAllSection" class="mb-5 flex flex-col gap-2" hidden>
            <button id="saveAllBtn" class="btn btn-primary btn-lg w-full" style="box-shadow:0 0 24px rgba(255,20,147,0.35)">
                Spara alla
            </button>
            <button id="saveZipBtn" class="btn btn-soft btn-sm w-full" style="--btn-color:#ff1493" hidden>
                Spara alla som ZIP
            </button>
        </section>

    </div>

    <footer class="site-footer footer footer-center py-6 border-t border-base-300 text-white/40 font-mono text-sm font-bold">
        <p>&copy; CP-Tjänst/Jesper Sandström 2026 <span class="badge badge-ghost badge-sm font-mono text-white/40">v1.00</span></p>
    </footer>

    <script src="script.js?v=1.00"></script>
</body>
</html>
