<!DOCTYPE html>
<html lang="sv" data-theme="halloween">
<head>
    <meta charset="UTF-8">
    <!-- Open Graph -->
    <meta property="og:title" content="HEIC2JPG – konvertera HEIC till JPG direkt i mobilen">
    <meta property="og:description" content="Snabb och privat HEIC-till-JPG-konvertering – allt sker lokalt i din webbläsare.">
    <meta property="og:type" content="website">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HEIC2JPG – konvertera HEIC till JPG</title>
    <meta name="description" content="Konvertera HEIC/HEIF-bilder till JPG direkt i webbläsaren. Inga filer laddas upp – allt sker lokalt.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700;800&family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.css" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=1.0">

    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Fira Sans', system-ui, -apple-system, sans-serif;
            --font-mono: 'Fira Mono', monospace;
            --color-primary: #ec4899;
            --color-primary-content: #1a1a2e;
        }
    </style>
    <link rel="stylesheet" href="h2j-styles.css?v=1.0">
</head>
<body class="min-h-screen bg-base-100 text-base-content font-sans">
    <div class="max-w-lg mx-auto px-4 py-6">

        <!-- HEADER -->
        <header class="mb-6">
            <div class="card card-border bg-base-200 shadow-md">
                <div class="card-body flex flex-col items-center gap-3 py-5">
                    <div class="w-20 h-20 p-2 bg-base-100 rounded-2xl border border-base-300 shrink-0">
                        <img src="favicon.svg?v=1.0" alt="H2J" class="w-full h-full object-contain drop-shadow-md">
                    </div>
                    <div class="text-center">
                        <div class="brand-title text-3xl font-extrabold tracking-wider uppercase font-mono">HEIC2JPG</div>
                        <div class="flex items-center justify-center flex-wrap gap-2 text-base-content/50 font-mono text-sm mt-1">
                            <span>HEIC till JPG – direkt i mobilen</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- PRIVACY NOTICE -->
        <div class="text-center text-sm text-base-content/60 mb-4 px-2">
            Dina bilder lämnar aldrig din enhet. All konvertering sker lokalt i webbläsaren.
        </div>

        <!-- UPLOAD ZONE -->
        <section class="mb-5">
            <div class="drop-zone card card-dash" id="dropZone">
                <div class="card-body flex flex-col justify-center items-center text-center py-10">
                    <svg class="upload-icon w-14 h-14 text-primary mb-3 opacity-70" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                    </svg>
                    <h3 class="text-base font-semibold mb-1">Tryck här eller dra och släpp</h3>
                    <p class="text-base-content/70 text-sm mb-0">Välj upp till 50 HEIC-bilder</p>
                </div>
                <input type="file" id="fileInput" accept=".heic,.heif,image/heic,image/heif" multiple hidden>
            </div>
        </section>

        <!-- QUALITY CONTROL -->
        <section class="card card-border mb-5" id="qualitySection" hidden>
            <div class="card-body py-4">
                <div class="flex items-center justify-between gap-4">
                    <label for="qualitySlider" class="text-sm text-base-content/85 whitespace-nowrap">JPG-kvalitet</label>
                    <span id="qualityValue" class="quality-display">92%</span>
                </div>
                <input type="range" id="qualitySlider" class="range range-primary range-sm w-full mt-2" min="50" max="100" value="92" aria-label="JPG-kvalitet">
            </div>
        </section>

        <!-- FILE LIST -->
        <section id="fileListSection" class="mb-5" hidden>
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-semibold text-base-content/85 font-mono" id="fileCount">0 bilder</span>
                <button type="button" id="clearBtn" class="btn btn-soft btn-error btn-sm">Rensa</button>
            </div>
            <div id="fileList" class="flex flex-col gap-2"></div>
        </section>

        <!-- OVERALL PROGRESS -->
        <section id="progressSection" class="card card-border mb-5" hidden>
            <div class="card-body py-4">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-sm font-semibold text-base-content/85">Konverterar...</span>
                    <span id="progressText" class="text-sm font-mono text-base-content/70">0 / 0</span>
                </div>
                <div class="overall-progress">
                    <div id="overallProgressFill" class="overall-progress-fill"></div>
                </div>
            </div>
        </section>

        <!-- CONVERT BUTTON -->
        <section class="mb-6" id="convertSection" hidden>
            <button id="convertBtn" class="btn btn-primary btn-lg w-full convert-btn" disabled>
                Konvertera till JPG
            </button>
        </section>

    </div>

    <footer class="site-footer footer footer-center py-6 border-t border-base-300 text-base-content/50 font-mono text-sm font-bold">
        <p>&copy; CP-Tjänst/Jesper Sandström 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="script.js?v=1.0"></script>
</body>
</html>
